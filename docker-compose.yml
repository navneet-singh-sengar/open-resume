services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite:///./data/open_resume.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - db_data:/app/backend/data
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
